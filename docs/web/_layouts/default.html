<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <script>
    (function(){
      var t = localStorage.getItem('rosetta-theme');
      if (!t && window.matchMedia) {
        t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <title>{% if page.url == '/' %}{{ site.seo_title | default: site.title }}{% elsif page.title %}{{ page.title }} | {{ site.seo_title | default: site.title }}{% else %}{{ site.seo_title | default: site.title }}{% endif %}</title>
  <meta name="description" content="Grid Dynamics Rosetta is an accelerator for software delivery using centralized instructions management for AI coding agents. To simplify, Rosetta is a smart library of prompts and a smart way to deliver them to your coding agents. Rosetta is not a proprietary coding agent. We do support all major coding agents. It uses the latest features - hooks, rules, skills, workflows, and subagents and it provides guardrails, processes and harnesses enabling AI systems to operate consistently with a deep understanding of system architecture, domain constraints, and engineering standards. All this without hardcoding it in the prompts. Rosetta accelerates project onboarding, requirements documentation, software development, and code maintenance by reverse-engineering architecture and domain context, improving the reliability and quality of AI-generated code by incorporating security guardrails, testing, documentation updates as part of workflows defined by Rosetta. It uses meta-prompting to teach coding agents how to think about the problem, not WHAT to think. We achieve a high level of reusability as SOTA models already know all programming languages and frameworks, we just need to guide coding agents to do things right.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ '/assets/brand/rosetta-favicon.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/brand/rosetta-favicon.png' | relative_url }}">
</head>
<body>
<a href="#main-content" class="skip-to-content">Skip to content</a>
{% include nav.html %}
<main id="main-content">
{{ content }}
</main>
<footer>
  <div class="footer-wrap">
    <span>Copyright &copy; {{ 'now' | date: '%Y' }} Grid Dynamics. All rights reserved.</span>
    <nav class="footer-nav" aria-label="Footer navigation">
      <a href="{{ '/overview/' | relative_url }}">Overview</a>
      <a href="{{ '/roadmap/' | relative_url }}">Roadmap</a>
      <a href="{{ '/contribute/' | relative_url }}">Contribute</a>
      <a href="https://github.com/griddynamics/rosetta" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a href="https://discord.gg/QzZ2cWg36g" target="_blank" rel="noopener noreferrer">Community</a>
      <a href="mailto:rosetta-support@griddynamics.com">Contact Us</a>
    </nav>
  </div>
</footer>
{% if page.url == '/' %}{% include try-rosetta.html %}{% endif %}
<!-- scroll reveal removed -->
</body>
</html>

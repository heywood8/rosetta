[mypy]
python_version = 3.12
strict = True
files = src/rosetta-cli, src/ims-mcp-server/ims_mcp, src/ims-mcp-server/validation
exclude = (?x)(^venv/|^src/rosetta-cli/tests/|^src/ims-mcp-server/tests/|^src/ims-mcp-server/dist/|^src/ims-mcp-server/ims_mcp\.egg-info/|/__pycache__/|/\.pytest_cache/)
show_error_codes = True
pretty = True
ignore_missing_imports = True
disable_error_code = import-not-found, import-untyped, no-untyped-call, untyped-decorator, has-type, misc

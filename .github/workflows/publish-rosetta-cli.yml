name: Publish Rosetta CLI

on:
  push:
    branches:
      - main
    paths:
      - 'src/rosetta-cli/**'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run CLI tests
      run: |
        pytest src/rosetta-cli/tests -v

    - name: Build package
      working-directory: ./src/rosetta-cli
      run: |
        python -m build

    - name: Check package
      working-directory: ./src/rosetta-cli
      run: |
        twine check dist/*

    - name: Check if version exists on PyPI
      id: check_version
      working-directory: ./src/rosetta-cli
      run: |
        VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://pypi.org/pypi/rosetta-cli/${VERSION}/json)

        if [ "$HTTP_CODE" = "200" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "::warning::Version $VERSION already exists on PyPI"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Version $VERSION is new, will publish"
        fi

    - name: Publish to PyPI
      if: steps.check_version.outputs.exists == 'false'
      working-directory: ./src/rosetta-cli
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.ROSETTA_CLI_PYPI_PASSWORD }}
      run: |
        twine upload dist/*

    - name: Fail if version exists
      if: steps.check_version.outputs.exists == 'true'
      run: |
        echo "::error::Version ${{ steps.check_version.outputs.version }} already exists on PyPI"
        echo ""
        echo "PyPI does not allow re-publishing the same version."
        echo "Please increment the version number in:"
        echo "  src/rosetta-cli/pyproject.toml"
        echo ""
        echo "Current version: ${{ steps.check_version.outputs.version }}"
        exit 1

    - name: Publish Success
      if: steps.check_version.outputs.exists == 'false'
      run: |
        echo "Successfully published version ${{ steps.check_version.outputs.version }} to PyPI!"
        echo "Package available at: https://pypi.org/project/rosetta-cli/${{ steps.check_version.outputs.version }}/"
        echo ""
        echo "Install with: pip install rosetta-cli==${{ steps.check_version.outputs.version }}"
        echo "Or with uvx: uvx rosetta-cli@latest"

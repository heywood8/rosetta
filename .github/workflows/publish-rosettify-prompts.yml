name: Publish Rosettify Prompts

on:
  push:
    branches:
      - main
    paths:
      - 'src/rosettify-prompts/**'
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'
        registry-url: 'https://registry.npmjs.org'

    - name: Update npm
      run: npm install -g npm@latest

    - name: Install dependencies
      working-directory: ./src/rosettify-prompts
      run: npm ci

    - name: Run type validation
      working-directory: ./src/rosettify-prompts
      run: npm run typecheck

    - name: Build package
      working-directory: ./src/rosettify-prompts
      run: npm run build

    - name: Run tests
      working-directory: ./src/rosettify-prompts
      run: npm run test

    - name: Check if version exists on npm
      id: check_version
      working-directory: ./src/rosettify-prompts
      run: |
        VERSION=$(node -p "require('./package.json').version")
        echo "version=$VERSION" >> $GITHUB_OUTPUT

        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://registry.npmjs.org/rosettify-prompts/${VERSION})

        if [ "$HTTP_CODE" = "200" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "::warning::Version $VERSION already exists on npm"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Version $VERSION is new, will publish"
        fi

    - name: Publish to npm
      if: steps.check_version.outputs.exists == 'false'
      working-directory: ./src/rosettify-prompts
      run: npm publish --access public

    - name: Fail if version exists
      if: steps.check_version.outputs.exists == 'true'
      run: |
        echo "::error::Version ${{ steps.check_version.outputs.version }} already exists on npm"
        echo ""
        echo "npm does not allow re-publishing the same version."
        echo "Please increment the version number in:"
        echo "  src/rosettify-prompts/package.json (version field - single source of truth)"
        echo ""
        echo "Current version: ${{ steps.check_version.outputs.version }}"
        exit 1

    - name: Publish Success
      if: steps.check_version.outputs.exists == 'false'
      run: |
        echo "Successfully published version ${{ steps.check_version.outputs.version }} to npm!"
        echo "Package available at: https://www.npmjs.com/package/rosettify-prompts/v/${{ steps.check_version.outputs.version }}"
        echo ""
        echo "Install with: npm install -g rosettify-prompts@${{ steps.check_version.outputs.version }}"
        echo "Or with npx: npx -y rosettify-prompts@latest"

name: Validate Prompts

# This workflow validates prompt quality using the Prompt Quality Auditor agent
# when changes are made to the instructions/ folder in pull requests.
#
# Required GitHub Secrets:
#   - ANTHROPIC_API_KEY: API key for Claude Code CLI
#
# The workflow:
# - Detects changed files in instructions/ folder
# - Compares base (target branch) vs new (PR branch) versions
# - Uses Claude Code CLI to run the Prompt Quality Auditor agent
# - Outputs issues sorted by severity (critical first)
# - Blocks PR if HIGH+ issues found (severity >= 3: high, very high, critical)
# - Creates a PR comment with all issues by severity

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "instructions/r*/**"
      - ".github/workflows/validate-prompts.yml"
      - ".github/prompts/prompt-comparison.md"
  workflow_dispatch:

jobs:
  validate:
    if: github.event_name != 'pull_request_target' || github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required for creating PR comments

    env:
      TMP_DIR: .tmp
      ALL_RESULTS_FILE: .tmp/all-results.json
      PR_COMMENT_FILE: .tmp/pr-comment.md
      FULL_REPORT_FILE: .tmp/full-report.md
      DIFF_FILE: .tmp/instructions.diff
      MODEL: opus
      TARGET_PR_NUMBER: ${{ github.event.pull_request.number }}
      TARGET_BASE_REF: ${{ github.event.pull_request.base.ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0 # Fetch all history to compare with base branch

      - name: Checkout PR content
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr
          fetch-depth: 0

      - name: Install Claude Code CLI
        run: |
          echo "Installing Claude Code CLI..."
          npm install -g @anthropic-ai/claude-code
          claude --version
          echo "Installing Rosetta plugin..."
          claude plugin marketplace add griddynamics/rosetta
          claude plugin install rosetta@rosetta

      - name: Get changed files in instructions folder
        id: changed-files
        run: |
          echo "Detecting changed files in instructions/ folder..."

          if [ -n "$TARGET_BASE_REF" ]; then
            BASE_BRANCH="$TARGET_BASE_REF"
            git -C pr remote add base "https://github.com/$GITHUB_REPOSITORY.git"
            git -C pr fetch base "$BASE_BRANCH"
            BASE_REF="base/$BASE_BRANCH"
          else
            BASE_REF="HEAD^"
          fi

          echo "Base ref: $BASE_REF"

          # Get changed files in instructions/ folder
          CHANGED_FILES=$(git -C pr diff --name-only "$BASE_REF"...HEAD -- 'instructions/r*/**' 2>/dev/null | tr '\n' ' ' || true)

          echo "Changed files: $CHANGED_FILES"
          echo "files=$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "base_ref=$BASE_REF" >> $GITHUB_OUTPUT

          # Count files
          if [ -z "$CHANGED_FILES" ]; then
            echo "count=0" >> $GITHUB_OUTPUT
          else
            COUNT=$(echo "$CHANGED_FILES" | wc -w | tr -d ' ')
            echo "count=$COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Generate diff
        if: steps.changed-files.outputs.count > 0
        env:
          BASE_REF: ${{ steps.changed-files.outputs.base_ref }}
        run: |
          mkdir -p $TMP_DIR
          git -C pr diff "$BASE_REF"...HEAD -- 'instructions/r*/**' > $DIFF_FILE 2>/dev/null || true
          echo "::notice::Diff generated: $(wc -l < $DIFF_FILE) lines"

      - name: Validate prompts
        id: validate
        if: steps.changed-files.outputs.count > 0
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_REF: ${{ steps.changed-files.outputs.base_ref }}
        run: |
          echo "Validating prompts..."

          CHANGED_FILES="${{ steps.changed-files.outputs.files }}"
          COUNT="${{ steps.changed-files.outputs.count }}"
          mkdir -p $TMP_DIR/agents

          PROMPT="Changed files: $CHANGED_FILES ; Git base ref=$BASE_REF ; Changed count=$COUNT ; Output file=$ALL_RESULTS_FILE ; Diff file=$DIFF_FILE ; PR content path=pr"
          echo "Prompt: $PROMPT"

          claude --model $MODEL \
            --allowedTools "Write(.tmp/**), Edit(.tmp/**), Read(.tmp/**), Read(instructions/**), Read(docs/**), Read(agents/**), Read(pr/**), Bash, Task" \
            --system-prompt-file ./.github/prompts/prompt-comparison.md \
            -p "$PROMPT"

          if [ ! -f "$ALL_RESULTS_FILE" ]; then
            echo "::warning::Output file not produced, creating empty result"
            echo '[]' > $ALL_RESULTS_FILE
          fi

          # Check for high severity issues
          HIGH_COUNT=$(jq '[.[] | .issues[]? | select(.severity >= 3)] | length' $ALL_RESULTS_FILE)
          echo "has_high_severity=$( [ "$HIGH_COUNT" -gt 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT

          [ "$HIGH_COUNT" -gt 0 ] && echo "::error::Found $HIGH_COUNT high/very high/critical issues" && exit 1
          echo "::notice::No high/critical issues found"

      - name: Generate PR comment
        if: always() && env.TARGET_PR_NUMBER != '' && steps.changed-files.outputs.count > 0
        run: |
          REPORTABLE_RESULTS=$(jq '[.[] | select(.error or ((.issues // []) | length > 0))]' "$ALL_RESULTS_FILE")
          REPORTABLE_COUNT=$(echo "$REPORTABLE_RESULTS" | jq 'length')

          cat > "$FULL_REPORT_FILE" <<EOF
          ## Prompt Quality Validation Report

          $( [ "${{ steps.validate.outputs.has_high_severity }}" = "true" ] && echo "Validation failed: high-severity issues found." || echo "Validation completed without high-severity issues." )

          ### Changed Files

          EOF

          jq -c '.[]' "$ALL_RESULTS_FILE" | while read -r result; do
            FILE=$(echo "$result" | jq -r '.file')

            if echo "$result" | jq -e '.error' > /dev/null 2>&1; then
              echo "- \`$FILE\`: error" >> "$FULL_REPORT_FILE"
            else
              ISSUE_COUNT=$(echo "$result" | jq '(.issues // []) | length')
              if [ "$ISSUE_COUNT" -eq 0 ]; then
                echo "- \`$FILE\`: no issues" >> "$FULL_REPORT_FILE"
              else
                echo "- \`$FILE\`: $ISSUE_COUNT issue(s)" >> "$FULL_REPORT_FILE"
              fi
            fi
          done

          echo -e "\n---\n" >> "$FULL_REPORT_FILE"

          jq -c '.[]' "$ALL_RESULTS_FILE" | while read -r result; do
            FILE=$(echo "$result" | jq -r '.file')
            echo -e "### \`$FILE\`\n" >> "$FULL_REPORT_FILE"

            if echo "$result" | jq -e '.error' > /dev/null 2>&1; then
              echo "**Error:** $(echo "$result" | jq -r '.error')" >> "$FULL_REPORT_FILE"
              echo -e "\n---\n" >> "$FULL_REPORT_FILE"
              continue
            fi

            ISSUES=$(echo "$result" | jq '[.issues // [] | sort_by(.severity) | reverse[]]')

            if [ "$(echo "$ISSUES" | jq 'length')" -eq 0 ]; then
              echo "No issues found." >> "$FULL_REPORT_FILE"
              echo -e "\n---\n" >> "$FULL_REPORT_FILE"
              continue
            fi

            cat >> "$FULL_REPORT_FILE" <<EOF
          | Severity | Gate | Details |
          |----------|------|---------|
          EOF

            echo "$ISSUES" | jq -r '.[] | [
              (if .severity == 5 then "Critical"
               elif .severity == 4 then "Very High"
               elif .severity == 3 then "High"
               elif .severity == 2 then "Medium"
               elif .severity == 1 then "Low"
               else "Unknown" end),
              .gate, .problem, .reason, .solution] | @tsv' | \
            while IFS=$'\t' read -r sev gate prob reason sol; do
              echo "| $sev | $gate | **Problem:**<br> $prob<br>**Reason:**<br> $reason<br>**Solution:**<br> $sol |" >> "$FULL_REPORT_FILE"
            done

            echo "" >> "$FULL_REPORT_FILE"

            # Keep grades in the artifact report, but not in the PR comment.
            echo "$result" | jq -e '.gates' > /dev/null 2>&1 && {
              echo "#### Gates Comparison" >> "$FULL_REPORT_FILE"
              echo "" >> "$FULL_REPORT_FILE"
              echo "| Gate | Score | Comparison |" >> "$FULL_REPORT_FILE"
              echo "|------|-------|------------|" >> "$FULL_REPORT_FILE"

              echo "$result" | jq -r '.gates | to_entries | .[] |
                [.key,
                 .value.score,
                 (if .value.comparison == 5 then "Much better"
                  elif .value.comparison == 4 then "Slightly better"
                  elif .value.comparison == 3 then "No change"
                  elif .value.comparison == 2 then "Slightly worse"
                  elif .value.comparison == 1 then "Much worse"
                  else "Unknown" end)] | @tsv' | \
              while IFS=$'\t' read -r gate score change; do
                echo "| $gate | $score | $change |" >> "$FULL_REPORT_FILE"
              done
            }

            echo -e "\n---\n" >> "$FULL_REPORT_FILE"
          done

          cat > "$PR_COMMENT_FILE" <<EOF
          ## :clipboard: Prompt Quality Validation Report

          $( [ "${{ steps.validate.outputs.has_high_severity }}" = "true" ] && echo "### :x: Validation Failed" || echo "### :white_check_mark: Validation Passed" )

          The full markdown report and raw JSON output are available in the workflow artifacts for 5 days.
          EOF

          echo -e "\n---\n" >> "$PR_COMMENT_FILE"

          if [ "$REPORTABLE_COUNT" -eq 0 ]; then
            echo "No issues were found in the changed prompt files." >> "$PR_COMMENT_FILE"
          else
            echo "### Files With Issues" >> "$PR_COMMENT_FILE"
            echo "" >> "$PR_COMMENT_FILE"

            echo "$REPORTABLE_RESULTS" | jq -c '.[]' | while read -r result; do
              FILE=$(echo "$result" | jq -r '.file')

              if echo "$result" | jq -e '.error' > /dev/null 2>&1; then
                echo "- \`$FILE\`: error" >> "$PR_COMMENT_FILE"
              else
                ISSUE_COUNT=$(echo "$result" | jq '(.issues // []) | length')
                echo "- \`$FILE\`: $ISSUE_COUNT issue(s)" >> "$PR_COMMENT_FILE"
              fi
            done

            echo -e "\n---\n" >> "$PR_COMMENT_FILE"
          fi

          # Process only files with detailed issues or errors
          echo "$REPORTABLE_RESULTS" | jq -c '.[]' | while read -r result; do
            FILE=$(echo "$result" | jq -r '.file')

            # Show file name first
            echo -e "### :page_facing_up: \`$FILE\`\n" >> "$PR_COMMENT_FILE"

            if echo "$result" | jq -e '.error' > /dev/null 2>&1; then
              echo "**Error:** $(echo "$result" | jq -r '.error')" >> "$PR_COMMENT_FILE"
              echo -e "\n---\n" >> "$PR_COMMENT_FILE"
              continue
            fi

            # Show issues
            ISSUES=$(echo "$result" | jq '[.issues // [] | sort_by(.severity) | reverse[]]')

            echo "#### :warning: Issues Found" >> "$PR_COMMENT_FILE"
            echo "" >> "$PR_COMMENT_FILE"
            cat >> "$PR_COMMENT_FILE" <<EOF
          | Severity | Gate | Details |
          |----------|------|---------|
          EOF

            echo "$ISSUES" | jq -r '.[] | [
              (if .severity == 5 then "Critical"
               elif .severity == 4 then "Very High"
               elif .severity == 3 then "High"
               elif .severity == 2 then "Medium"
               elif .severity == 1 then "Low"
               else "Unknown" end),
              .gate, .problem, .reason, .solution] | @tsv' | \
            while IFS=$'\t' read -r sev gate prob reason sol; do
              echo "| $sev | $gate | **Problem:**<br> $prob<br>**Reason:**<br> $reason<br>**Solution:**<br> $sol |" >> "$PR_COMMENT_FILE"
            done
            echo "" >> "$PR_COMMENT_FILE"

            echo -e "\n---\n" >> "$PR_COMMENT_FILE"
          done

      - name: Upload prompt validation artifacts
        if: always() && steps.changed-files.outputs.count > 0
        uses: actions/upload-artifact@v4
        with:
          name: prompt-validation-report
          retention-days: 5
          if-no-files-found: error
          path: |
            .tmp/full-report.md
            .tmp/all-results.json

      - name: Delete old prompt validation comments
        if: always() && env.TARGET_PR_NUMBER != '' && steps.changed-files.outputs.count > 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Deleting old prompt validation comments..."

          gh api "repos/$GITHUB_REPOSITORY/issues/$TARGET_PR_NUMBER/comments" --paginate | \
            jq -r '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("Prompt Quality Validation Report"))) | .id' | \
            while read -r comment_id; do
              [ -n "$comment_id" ] || continue
              echo "Deleting comment $comment_id"
              gh api "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" -X DELETE
            done

      - name: Post PR comment
        if: always() && env.TARGET_PR_NUMBER != '' && steps.changed-files.outputs.count > 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Posting PR comment..."

          # Use gh CLI to create PR comment
          gh pr comment "$TARGET_PR_NUMBER" \
            --body-file $PR_COMMENT_FILE

          echo "::notice::PR comment posted"

      - name: Summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## Prompt Validation Summary

          - **Files validated:** ${{ steps.changed-files.outputs.count }}
          - **Status:** $( [ "${{ steps.validate.outputs.has_high_severity }}" = "true" ] && echo ":x: Failed" || echo ":white_check_mark: Passed" )
          EOF

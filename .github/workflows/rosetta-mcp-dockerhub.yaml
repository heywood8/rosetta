name: Rosetta MCP DockerHub Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'ims-mcp-server/ims_mcp/**'
      - 'ims-mcp-server/pyproject.toml'
      - '.github/workflows/rosetta-mcp-dockerhub.yaml'
      - 'ims-mcp-server/Dockerfile'

permissions:
  contents: read

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Extract version from pyproject.toml
        id: extract-version
        run: |
          VERSION=$(grep '^version = ' ims-mcp-server/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Extracted version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Create venv and install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "$GITHUB_WORKSPACE/venv/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install rosettify dependencies
        run: npm ci --prefix rosettify

      - name: Run type validation
        run: |
          chmod +x validate-types.sh
          ./validate-types.sh

  build-and-push:
    needs:
      - prepare-version
      - typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check if stable version
        id: stable
        env:
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "is_stable=true" >> $GITHUB_OUTPUT
          else
            echo "is_stable=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_LOGIN }}
          password: ${{ secrets.DOCKERHUB_OAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_LOGIN }}/rosetta-mcp
          tags: |
            type=raw,value=${{ needs.prepare-version.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && steps.stable.outputs.is_stable == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ims-mcp-server
          file: ims-mcp-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Publish image details
        env:
          IMAGE_TAG: ${{ needs.prepare-version.outputs.version }}
          DOCKERHUB_LOGIN: ${{ secrets.DOCKERHUB_LOGIN }}
        run: |
          echo "::notice title=Built image tag::$IMAGE_TAG"
          {
            echo "## Rosetta MCP image"
            echo
            echo "- Version: \`$IMAGE_TAG\`"
            echo "- Image: \`$DOCKERHUB_LOGIN/rosetta-mcp:$IMAGE_TAG\`"
          } >> "$GITHUB_STEP_SUMMARY"
